name: Build and Release Bot Package

on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - '.github/workflows/build-release-bot.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install production dependencies
        run: npm ci --omit=dev
        working-directory: bot

      - name: Create deployment zip
        run: |
          cd bot
          zip -r ../bot.zip . -x ".vscode/*" "manifest/*"

      - name: Publish or update "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest bot package
          body: Auto-built from main. The Deploy to Azure button pulls bot.zip from this release.
          files: bot.zip
          make_latest: 'true'
